services:
  - type: web
    name: tap-and-pay-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false
      - key: PAWAPAY_API_KEY
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: PRODUCTION
        value: true
      - key: SMTP_ENABLED
        value: true
      - key: SMTP_SERVER
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_FROM_NAME
        value: Tap & Pay

  - type: static
    name: tap-and-pay-frontend
    buildCommand: echo "Static site - no build needed"
    publishPath: static
    envVars:
      - key: API_URL
        fromService:
          name: tap-and-pay-api
          type: web
          property: host